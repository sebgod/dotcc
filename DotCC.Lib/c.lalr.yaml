  # means "always true"; ForPost empty means no update step.
  - ForCond        # 143 non-terminal: for-condition (E or empty)
  - ForPost        # 144 non-terminal: for-update (CommaExprList or empty)
  # Initializer-element list with an OPTIONAL TRAILING COMMA (`{1, 2, 3,}` ÔÇö
  # C90-legal). Separate from the call-argument `ArgList` (right-recursive,
  # where a trailing comma is illegal): this one is LEFT-recursive so the
  # trailing-comma rule is conflict-free (`InitList ÔåÆ E` reduces only on `}`,
  # never on `,`). Produces the same Args payload, so the init visitors read it
  # via A() unchanged.
  - InitList       # 145 non-terminal: brace-init element list (trailing comma OK)
  # ScopeEnter ÔÇö an epsilon marker reduced immediately after a block's `{`
  # (and after a `for (` that introduces a declaration). It has no surface
  # syntax; its sole purpose is to give the emitter a "scope opened" hook in
  # the bottom-up SDT ÔÇö the Block / stmtForDecl action is the matching "scope
