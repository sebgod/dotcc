# C ÔÇö the dotcc grammar. Initially seeded from LALR.CC's CMinus example
# (a tight C99 subset transpiled to unsafe AOT-clean C#), and being expanded
# from there toward more of real C. The filename drives the generated class
# name: `c.lalr.yaml` ÔåÆ `DotCC.C` (schema + AST records + IVisitor + the
# preprocessor framework hooks).
#
# Pipeline (assembled in Program.cs):
#   BytesLexer ÔåÆ PreprocessorTokenStream ÔåÆ SyncLATokenIterator ÔåÆ Parser ÔåÆ CSharpEmitter
#
# The preprocessor block at the bottom of this file declares `#include /
# #define / #undef` directives plus the conditional family
# (`#if / #ifdef / #ifndef / #else / #endif`). The source generator emits an
# `IPreprocessor` interface with one method per declared directive; the
# visitor wires that into BytesLexer ÔåÆ WrapPreprocessor ÔåÆ parser so the
# directives run end-to-end before parsing even starts.
#
# What's in the language:
#   - Functions: `int foo(int* p, int n) { ... }`
#   - Local decls with optional init: `int x;` or `int x = 5;`
#   - Pointer types of arbitrary depth: `int*`, `int**`
#   - Statements: if/else, while, return, expression-stmt, block
#   - Expressions with full C-style precedence including assignment-as-expr,
#     unary `*` / `&` / `-`, calls with arg lists
#   - Line comments `// ...`
#   - Preprocessor: `#include "file.cmm"` and `#define NAME body`
#
# What's deliberately OUT:
#   - typedefs (avoid the classic "lexer hack")
#   - structs, unions, arrays (just pointers + heap)
#   - string literals (only `"..."` is the directive arg for `#include`)
#   - global variables (only function definitions at top level)
#   - varargs, function-like macros, `#if`/`#ifdef`/conditional compilation
#   - `setjmp`/`longjmp`, switch/case, for-loops, bitwise ops
#
# Precedence ladder (lowest ÔåÆ highest):
#   E       : assignment (right-associative)
#   LOr     : ||
#   LAnd    : &&
#   Equ     : == !=
#   Rel     : < > <= >=
#   Add     : + -
#   Mul     : * /
#   Unary   : unary * & -                       (right-associative)
#   Postfix : function call                     (left-associative)
#   Primary : ID, NUM, ( E )
#
# Dangling-else: the two `if` rules share a `derivation: rightmost` group so on
# lookahead `else` at state `[if ( E ) Stmt]` the parser shifts (else binds to
# the nearest if). Same trick the LaTeX example uses for unary minus.

