  # shadowing (two same-name locals in nested-vs-enclosing scopes, which C#
  # rejects as CS0136) can be alpha-renamed apart. See CSharpEmitter's
  # PushScope / DeclareLocal / ResolveLocal.
  - ScopeEnter     # 146 marker non-terminal (epsilon)
  # Expr ÔÇö the full-expression tier (the comma operator), one level BELOW
  # assignment (`E`). `Expr ÔåÆ Expr ',' E` is C's comma operator: lowest
  # precedence, left-associative, evaluate each operand left-to-right, value is
  # the last. Used ONLY where C's grammar uses `expression` rather than
  # `assignment-expression` ÔÇö the parenthesized primary `( Expr )` and the
  # expression statement `Expr ;` ÔÇö so commas in call arguments / initializers
  # (which stay on `E`) remain separators, not operators.
  - Expr           # 147
  # `extern` storage class (C89). On a variable it DECLARES without defining
  # (storage lives in another translation unit); on a function it's the default
  # linkage (redundant). dotcc emits nothing for an extern declaration /
  # prototype and emits normally for an extern function definition.
  - 'extern'       # 148 keyword (C89)
  # StringSeq ÔÇö one or more adjacent string literals. C concatenates adjacent
  # string literals into a single literal (translation phase 6): `"a" "b"` is
  # `"ab"`. Left-recursive so any run folds into one Primary; the visitor
  # decodes each segment's escapes independently and concatenates the bytes
  # (so a `\xÔÇª` escape never greedily eats the next segment's leading digit).
  - StringSeq      # 149
  # ArrDims ÔÇö the `[D1][D2]ÔÇª` dimension list of an array declarator. One or more
  # `[ E ]`; left-recursive so a multi-dimensional array folds into one list.
  # dotcc flattens a multi-dim array to a 1-D `stackalloc` and rewrites
  # `a[i][j]` to flat pointer arithmetic (C# stackalloc is 1-D).
  - ArrDims        # 150
  # `restrict` (C99) ÔÇö a pointer-only type qualifier (`int *restrict p`). dotcc
  # has no aliasing model, so it's parsed and DROPPED (like const/volatile); a
  # future optimization could map a `restrict` parameter to a by-ref / no-alias
  # hint. GNU `__restrict` / `__restrict__` lex to this same token.
  - 'restrict'     # 151 keyword (C99) ÔÇö pointer qualifier
  # `auto` ÔÇö reserved in every C dialect, two meanings disambiguated by context:
  # (1) pre-C23 storage-class (`auto int x;`) ÔÇö redundant (the default for a
  # block local), so dropped; (2) C23 type inference (`auto x = E;`) ÔÇö deduce
  # from the initializer, lowered to C# `var`. After `auto`, a plain `ID` (not a
  # TYPE_NAME) ÔåÆ inference; a type keyword / TYPE_NAME / struct|union|enum ÔåÆ
  # storage class. The C23 inference meaning is dialect-gated; the keyword is C89.
  - 'auto'         # 152 keyword
  # InitElem ÔÇö one brace-initializer element: a scalar expression or a nested
  # `{ ÔÇª }` group. Lets InitList build a recursive InitNode tree so nested
  # aggregate initializers (`{{1,2},{3,4}}`) keep their structure.
  - InitElem       # 153
  # `inline` (C99) ÔÇö function specifier. Spelled like an ordinary identifier and
  # reserved only in C99+, so it has NO lexer rule (same as `bool`/`true`):
  # DialectKeywordRewriter promotes the ID ÔåÆ this terminal under -std >= c99,
  # leaving `inline` a usable identifier pre-C99. Parsed as a TypeSpec so it
  # composes with the existing static/extern prefixes (`inline int f()`,
  # `static inline int f()`, `extern inline int f()`); ResolveTypeSpec drops it
  # from the resolved type and the FnSig path turns it into a
  # [MethodImpl(MethodImplOptions.AggressiveInlining)] on the emitted method.
  - 'inline'       # 154 keyword (C99) ÔÇö function specifier

productions:
  # Start production. Single-non-terminal ÔÇö trimmed at parse time so the root
  # Item carries FnList's already-built C# source string.
  - derivation: none
    rules:
      - { lhs: TU, rhs: [FnList] }

  - derivation: leftmost
    rules:
      - { lhs: FnList, rhs: [Fn, FnList], action: fnsCons }
      - { lhs: FnList, rhs: [Fn],          action: fnsOne }

  # Function signature ÔÇö six combinations of storage class ├ù parameter form.
  # Each fnSig* action returns a structured EmitContent.FnHeader carrying
  # (type, name, params, isStatic), AND sets the emitter's
  # _currentFunctionName state so any __func__ inside the body resolves to
  # this name at Var-visit time.
  - derivation: none
    rules:
      - { lhs: FnSig, rhs: [Type, ID, '(', ParamList, ')'],     action: fnSig }
      - { lhs: FnSig, rhs: [Type, ID, '(', ')'],                action: fnSigNoArgs }
      - { lhs: FnSig, rhs: [Type, ID, '(', 'void', ')'],        action: fnSigVoidArgs }
      - { lhs: FnSig, rhs: ['static', Type, ID, '(', ParamList, ')'], action: fnSigStatic }
      - { lhs: FnSig, rhs: ['static', Type, ID, '(', ')'],            action: fnSigStaticNoArgs }
      - { lhs: FnSig, rhs: ['static', Type, ID, '(', 'void', ')'],    action: fnSigStaticVoidArgs }

  - derivation: none
    rules:
      # Function ÔÇö split into FnSig (signature) and the body half. Since
      # FnSig reduces BEFORE Block in LALR bottom-up, the FnSig action can
      # set the visitor's "current function" state in time for any
      # `__func__` inside the body to resolve directly. Six FnSig variants
      # cover the storage-class ├ù parameter-form combinations:
      #   FnSig ÔåÆ Type ID ( ParamList )      regular function
      #   FnSig ÔåÆ Type ID ( )                no-args (K&R)
      #   FnSig ÔåÆ Type ID ( void )           explicit no-args
      #   plus static-modifier variants of each.
      # Then `Fn ÔåÆ FnSig Block` is a function definition, `Fn ÔåÆ FnSig ';'`
      # is a prototype. Saves 4 productions overall (8 vs 12).
      - { lhs: Fn, rhs: [FnSig, Block], action: funcDef }
      - { lhs: Fn, rhs: [FnSig, ';'],    action: funcProto }
      # Struct declaration: `struct ID { MemberList } ;`. Disambiguates from
      # `struct ID *? ID(...)` (function returning a struct) by lookahead on
      # `{` ÔÇö when the parser sees `struct ID {`, structDef is the only
      # production that fits. The visitor side-channels the resulting
      # source into a struct-decls collection (see CSharpEmitter); the
      # action's emit value is empty so it doesn't appear inside the user-
      # function emit, which would violate C#'s top-level-statements-before-
      # type-declarations rule.
      - { lhs: Fn, rhs: ['struct', ID, '{', MemberList, '}', ';'], action: structDef }
      # Forward struct declaration: `struct Node ;` (no body). Required for
      # self-referential types declared across translation-unit boundaries
      # and for circular references between sibling types. Emits nothing
      # in C# (types hoist regardless of declaration order).
      - { lhs: Fn, rhs: ['struct', ID, ';'], action: structFwd }
      # Enum declaration: `enum Name { A, B = 5, C } ;`. Lowers to a series
      # of top-level `const int NAME = VAL;` so users can reference the
      # enumerators by their bare name (matching C's int-constant
      # semantics). The visitor auto-numbers items that have no explicit
      # value: each unnumbered item is `previous + 1`, starting at 0.
      - { lhs: Fn, rhs: ['enum', ID, '{', EnumList, '}', ';'], action: enumDef }
      # C23 enum with an explicit fixed underlying type: `enum Name : Type { ÔÇª } ;`.
      # The Type is an integer type-specifier; it lowers to a real C# enum whose
      # base is the mapped integral type (`unsigned char` ÔåÆ `byte`, `int` ÔåÆ `int`,
      # ÔÇª). After `enum ID`, a `:` is unambiguous ÔÇö Type is never followed by `:`.
      - { lhs: Fn, rhs: ['enum', ID, ':', Type, '{', EnumList, '}', ';'], action: enumDefTyped }
      # Union declaration: `union Name { Type f1; Type f2; ÔÇª } ;`. Reuses
      # the struct MemberList. Lowers to a C# struct with
      # [StructLayout(LayoutKind.Explicit)] and [FieldOffset(0)] on every
      # member ÔÇö matches C's overlapping-storage semantics.
      - { lhs: Fn, rhs: ['union', ID, '{', MemberList, '}', ';'], action: unionDef }
      # `typedef Type ID ;` ÔÇö simple alias. Covers `typedef int Color;`,
      # `typedef int* IntPtr;`, and `typedef struct Foo Foo;` (the last one
      # because Type reduces from `struct ID`). The rewriter records the
      # trailing ID as a typedef-name so subsequent uses lex as TYPE_NAME.
      # The visitor emits a C# `using` alias when the source type lowers to
      # a single C# identifier (e.g. struct tag), otherwise emits nothing ÔÇö
      # C# already infers usage from the underlying type and the lexer hack
      # has done its job at parse time.
      - { lhs: Fn, rhs: ['typedef', Type, ID, ';'], action: typedefAlias }
      # `typedef struct ID { MemberList } ID ;` ÔÇö struct definition + alias
      # in one go (the common C idiom). The trailing ID may differ from the
      # tag ÔÇö the visitor emits the C# struct under the alias name (since C#
      # has no separate tag namespace) plus an empty alias for the tag form
      # when they differ.
      - { lhs: Fn, rhs: ['typedef', 'struct', ID, '{', MemberList, '}', ID, ';'], action: typedefStruct }
      # Function-pointer typedef: `typedef Ret (*Name)(args);`. Lowers to
      # C# `using unsafe Name = delegate*<args..., Ret>;`. The standalone
      # form `int (*fn)(int);` is famously hard to LALR-parse due to the
      # embedded name ÔÇö typedef'd form is the idiomatic use case anyway,
      # and once aliased, `Name fn;` works through the TypeNameRewriter.
      - { lhs: Fn, rhs: ['typedef', Type, '(', '*', ID, ')', '(', ParamList, ')', ';'], action: typedefFnPtr }
      - { lhs: Fn, rhs: ['typedef', Type, '(', '*', ID, ')', '(', ')', ';'], action: typedefFnPtrNoArgs }
      # File-scope variable declarations: `int x;`, `int x = E;`, and
      # the multi-declarator forms `int a, b;` / `int a = 1, b = 2;`
      # / `int a, b = 5;` at top level. Real C needs these for globals
      # (e.g. <setjmp.h>'s `jmp_buf env;` shared between the setjmp site
      # and the longjmp caller). Lowered to one `static unsafe Type name`
      # (or `= E`) per declarator inside `DotCcGlobals`. Reuses the same
      # `DeclItemList` non-terminal that block-level `Decl` uses, so the
      # comma-separated init-declarator semantics stay in lockstep
      # between file-scope and block-scope declarations.
      - { lhs: Fn, rhs: [Type, DeclItemList, ';'], action: globalDeclList }
      # File-scope `static T x;` ÔÇö internal linkage + static storage duration.
      # In dotcc's single-program model internal-vs-external linkage is a no-op
      # for variables (they're never exported), so this lowers exactly like a
      # plain global: a field in DotCcGlobals. The `static` keyword is consumed.
      - { lhs: Fn, rhs: ['static', Type, DeclItemList, ';'], action: globalStaticDeclList }

      # `extern` declarations. An extern function prototype (`extern T f(args);`)
      # and an extern variable declaration (`extern T x;`) DECLARE without
      # defining ÔÇö emit nothing (the definition / storage lives in another TU).
      # An extern function DEFINITION (`extern T f(args) { ÔÇª }`) is just a normal
      # definition (extern is the default function linkage). FnSig is reused for
      # the function forms; the variable form mirrors globalDeclList. After
      # `extern Type ID`, lookahead `(` ÔåÆ FnSig, else ÔåÆ DeclItemList ÔÇö the same
      # split the non-extern `FnSig` vs `Type DeclItemList` rules already use.
      - { lhs: Fn, rhs: ['extern', FnSig, ';'],              action: externFnProto }
      - { lhs: Fn, rhs: ['extern', FnSig, Block],            action: externFnDef }
      - { lhs: Fn, rhs: ['extern', Type, DeclItemList, ';'], action: externVarDecl }

      # `_Static_assert(expr, "msg");` (C11) and `_Static_assert(expr);`
      # (C23, message optional). File-scope form. Compile-time only ÔÇö no
      # observable runtime behaviour ÔÇö so the visitor lowers it to a comment
      # (see Visit(C.StaticAssert)); valid programs emit nothing.
      - { lhs: Fn, rhs: ['_Static_assert', '(', E, ',', STRING, ')', ';'], action: staticAssert }
      - { lhs: Fn, rhs: ['_Static_assert', '(', E, ')', ';'],              action: staticAssertNoMsg }

  - derivation: leftmost
    rules:
      - { lhs: ParamList, rhs: [Param, ',', ParamList], action: paramsCons }
      - { lhs: ParamList, rhs: [Param],                  action: paramsOne }
      # Varargs marker ÔÇö only legal at the end of the param list, since
      # `...` can't start another `Param ',' ...` chain. The grammar lets
      # `paramsVararg` appear only as the tail because `...` is not a Param.
      - { lhs: ParamList, rhs: [Param, ',', '...'],     action: paramsVararg }

  - derivation: none
    rules:
      - { lhs: Param, rhs: [Type, ID], action: param }
      # Unnamed (abstract) parameter ÔÇö `int f(int, char*)`, and the params of a
      # function-pointer type `int (*fp)(int, int)`. C allows a name-less
      # parameter in declarations / function-pointer types; the visitor
      # synthesizes a unique C# name (C# requires one). Disambiguated from the
      # named form by lookahead: `Type ID` ÔåÆ named, `Type` then `,`/`)` ÔåÆ unnamed.
      - { lhs: Param, rhs: [Type], action: paramUnnamed }
      # C array-parameter decay (C99 ┬º6.7.5.3p7): `T arr[]` and `T arr[N]`
      # in a function-parameter position are equivalent to `T* arr` ÔÇö the
      # array silently decays to a pointer at the function-type boundary.
      # The size in `T arr[N]` is informational only (clang/gcc don't even
      # warn at the call site for size mismatches without `-Wstrict-prototypes`),
      # so we drop it entirely and emit a pointer parameter.
      - { lhs: Param, rhs: [Type, ID, '[', ']'],     action: paramArrayUnsized }
      - { lhs: Param, rhs: [Type, ID, '[', E, ']'],  action: paramArraySized }
      # Function-pointer parameter ÔÇö `void qsort(ÔÇª, int (*cmp)(const void*, const void*))`.
      # Same `( * ID ) ( ÔÇª )` shape as the local fn-ptr declarator; lowers to a
      # `delegate*<argsÔÇª, ret>` parameter. (The typedef'd form `Comparator cmp`
      # also works.) Disambiguated from `Type ID ÔÇª` by the `(` after Type.
      - { lhs: Param, rhs: [Type, '(', '*', ID, ')', '(', ParamList, ')'], action: paramFnPtr }
      - { lhs: Param, rhs: [Type, '(', '*', ID, ')', '(', ')'],            action: paramFnPtrNoArgs }

  # Type ÔÇö the "declarator type" non-terminal. Most C type forms reduce to
  # this via TypeSpecList (the C-standard declaration-specifier sequence:
  # any order, any combination of `signed/unsigned`, `short/long/long-long`,
  # `char/int/float/double/void` keywords). Tag types (`struct`/`union`/
  # `enum`/`TYPE_NAME`) don't combine with other specifiers ÔÇö they're
  # separate Type productions. Pointer depth composes left-recursively.
  - derivation: leftmost
    rules:
      - { lhs: Type, rhs: [Type, '*'],   action: typePtr }
      # Pointer qualifiers after `*` ÔÇö `int * const p`, `int *restrict p`,
      # `int * volatile p`. No C# equivalent (no readonly locals, no aliasing
      # model), so they parse and are DROPPED: the pointer type is unchanged.
      # Conflict-free: after `Type '*'`, only these qualifier tokens shift here;
      # any other lookahead reduces the plain `Type '*'` pointer.
      - { lhs: Type, rhs: [Type, '*', 'const'],    action: typePtrQualConst }
      - { lhs: Type, rhs: [Type, '*', 'volatile'], action: typePtrQualVolatile }
      - { lhs: Type, rhs: [Type, '*', 'restrict'], action: typePtrQualRestrict }
      - { lhs: Type, rhs: [TypeSpecList], action: typeFromSpec }
      # `struct ID` as a type reference ÔÇö used in declarations, parameters,
      # casts, sizeof. The visitor emits just `ID` since C# doesn't require
      # the `struct` keyword in usage position (only at declaration).
      - { lhs: Type, rhs: ['struct', ID], action: typeStruct }
      # `TYPE_NAME` ÔÇö synthetic terminal injected by TypeNameRewriter for
      # any ID that's been seen on the LHS of a previous `typedef`. The
      # visitor emits the type-name string verbatim (it's already the
      # C# type identifier we want).
      - { lhs: Type, rhs: [TYPE_NAME], action: typeName }
      # `enum ID` as a type reference. Lowers to plain `int` in C# since
      # enumerators are emitted as `const int` constants (not a C# enum).
      - { lhs: Type, rhs: ['enum', ID], action: typeEnum }
      # `union ID` as a type reference ÔÇö emits just the ID (the generated
      # union-struct decl shares the same name, like `struct ID`).
      - { lhs: Type, rhs: ['union', ID], action: typeUnion }

  # TypeSpecList ÔÇö accumulator of declaration-specifier keywords. Free
  # order: `long unsigned int` and `unsigned int long` and `int unsigned
  # long` all parse the same multiset. The visitor emits a marker string
  # per spec; TypeSpecList just concatenates; Type ÔåÆ TypeSpecList's
  # visitor (`typeFromSpec`) inspects the final marker set and resolves
  # to the corresponding C# type. Adding `const`/`volatile`/etc. later
  # just adds new TypeSpec rules ÔÇö no combinatorial explosion.
  - derivation: leftmost
    rules:
      - { lhs: TypeSpecList, rhs: [TypeSpec], action: typeSpecListOne }
      - { lhs: TypeSpecList, rhs: [TypeSpecList, TypeSpec], action: typeSpecListCons }

  - derivation: none
    rules:
      - { lhs: TypeSpec, rhs: ['int'],      action: tsInt }
      - { lhs: TypeSpec, rhs: ['char'],     action: tsChar }
      - { lhs: TypeSpec, rhs: ['float'],    action: tsFloat }
      - { lhs: TypeSpec, rhs: ['double'],   action: tsDouble }
      - { lhs: TypeSpec, rhs: ['void'],     action: tsVoid }
      - { lhs: TypeSpec, rhs: ['short'],    action: tsShort }
      - { lhs: TypeSpec, rhs: ['long'],     action: tsLong }
      - { lhs: TypeSpec, rhs: ['unsigned'], action: tsUnsigned }
      - { lhs: TypeSpec, rhs: ['signed'],   action: tsSigned }
      - { lhs: TypeSpec, rhs: ['_Bool'],    action: tsBool }
      - { lhs: TypeSpec, rhs: ['_Float128'], action: tsFloat128 }
      # Type qualifiers ÔÇö parsed as specifiers, dropped at resolution.
      - { lhs: TypeSpec, rhs: ['const'],    action: tsConst }
      - { lhs: TypeSpec, rhs: ['volatile'], action: tsVolatile }
      # Function specifier ÔÇö `inline` (C99). Parsed in the specifier run; dropped
      # from the resolved type, but TypeFromSpec flags it so the FnSig path emits
      # a [MethodImpl(AggressiveInlining)]. (Promoted from ID by the dialect rewriter.)
      - { lhs: TypeSpec, rhs: ['inline'],   action: tsInline }

  - derivation: none
    rules:
      # ScopeEnter fires right after `{` (before the body reduces), giving the
      # emitter a block-entry hook for local-scope tracking. The matching pop is
      # the block / blockEmpty action.
      - { lhs: Block, rhs: ['{', ScopeEnter, StmtList, '}'], action: block }
      - { lhs: Block, rhs: ['{', ScopeEnter, '}'],            action: blockEmpty }
      - { lhs: ScopeEnter, rhs: [], action: scopeEnter }

  - derivation: leftmost
    rules:
      - { lhs: StmtList, rhs: [Stmt, StmtList], action: stmtsCons }
      - { lhs: StmtList, rhs: [Stmt],            action: stmtsOne }

  # Dangling-else: rightmost so on lookahead `else` at state `[if ( E ) Stmt]`
  # the parser shifts (binds the else to the nearest if). The two if rules
  # have to share a group for the precedence resolution to apply.
  - derivation: rightmost
    rules:
      - { lhs: Stmt, rhs: ['if', '(', E, ')', Stmt],             action: stmtIf }
      - { lhs: Stmt, rhs: ['if', '(', E, ')', Stmt, 'else', Stmt], action: stmtIfElse }

  # All other Stmt rules. Disjoint first sets ÔÇö no S/R within this group.
  - derivation: none
    rules:
      - { lhs: Stmt, rhs: ['while', '(', E, ')', Stmt], action: stmtWhile }
      # `do Stmt while (E) ;` ÔÇö runs the body at least once. Cond is
      # wrapped with Cond.B like the other loop conditions.
      - { lhs: Stmt, rhs: ['do', Stmt, 'while', '(', E, ')', ';'], action: stmtDoWhile }
      # for-loop. Three init shapes (decl / expr / empty) ├ù optional cond /
      # update via the nullable ForCond / ForPost non-terminals ÔÇö so `for (;;)`,
      # `for (i=0;;i++)`, `for (; i<n; )` etc. all parse. ForCond produces the
      # `Cond.B(...)`-wrapped condition (or `true` when empty); ForPost the
      # update text (or empty). `for (int i ÔÇª)` (decl init) is the C99 form the
      # dialect gate flags under -std=c90.
      # ScopeEnter after `for (` opens a scope for the init declaration (which
      # in C scopes to the whole for-statement, body included) so a `for (int i ÔÇª)`
      # that shadows an outer `i` is renamed apart. Matching pop is stmtForDecl.
      - { lhs: Stmt, rhs: ['for', '(', ScopeEnter, Decl, ';', ForCond, ';', ForPost, ')', Stmt], action: stmtForDecl }
      - { lhs: Stmt, rhs: ['for', '(', CommaExprList, ';', ForCond, ';', ForPost, ')', Stmt], action: stmtForExpr }
      - { lhs: Stmt, rhs: ['for', '(', ';', ForCond, ';', ForPost, ')', Stmt], action: stmtForNoInit }
      - { lhs: ForCond, rhs: [E], action: forCondExpr }
      - { lhs: ForCond, rhs: [],  action: forCondEmpty }
      - { lhs: ForPost, rhs: [CommaExprList], action: forPostExprs }
      - { lhs: ForPost, rhs: [],              action: forPostEmpty }
      # Comma-separated expression list. Used in for-init / for-update so
      # `for (i=0, j=10; ÔÇª; i++, j--)` parses. C lets the comma operator
      # appear in arbitrary expression contexts too; that more general
      # form isn't supported yet (would need a top-level Expr non-terminal
      # over E, plus a lowering for the value-of-rhs semantics). The
      # for-init/update positions cover the dominant use case.
      - { lhs: CommaExprList, rhs: [E],                        action: commaExprOne }
      - { lhs: CommaExprList, rhs: [CommaExprList, ',', E],    action: commaExprCons }
      - { lhs: Stmt, rhs: ['return', E, ';'],            action: stmtReturn }
      - { lhs: Stmt, rhs: ['return', ';'],                action: stmtReturnVoid }
      # `break;` / `continue;` ÔÇö bare keyword + semicolon. Grammar accepts
      # them anywhere a Stmt is valid; semantic validity (must be inside a
      # loop) is enforced by the downstream C# compiler. Matches real C.
      - { lhs: Stmt, rhs: ['break', ';'],                  action: stmtBreak }
      - { lhs: Stmt, rhs: ['continue', ';'],               action: stmtContinue }
      # `switch (E) Block` ÔÇö the switch body is a plain Block (sequence of
      # statements). `case X:` and `default:` are statement-level labels
      # (see `caseLabel` / `defaultLabel` further down), so they can appear
      # ANYWHERE inside the switch's Block ÔÇö including deeply nested,
      # interleaved with loops. This is what lets Duff's device parse:
      # the do-while loop's body has case labels mixed in alongside regular
      # statements. C# accepts the same shape (case labels anywhere inside
      # the switch block). User still writes `break;` per case clause ÔÇö
      # matches C convention and C# requirement.
      - { lhs: Stmt, rhs: ['switch', '(', E, ')', Block], action: stmtSwitch }
      - { lhs: Stmt, rhs: [Decl, ';'],                    action: stmtDecl }
      # Block-scope `static T x;` / `static T x = C;` ÔÇö static storage
      # duration, function-local visibility. Lowers to a mangled static field
      # in DotCcGlobals (one instance, persists across calls), with uses inside
      # the function rewritten to the mangled name. Scalars + plain (no-init)
      # structs via `Type DeclItemList`; static arrays / aggregate-init statics
      # aren't covered (their `stackalloc` lowering doesn't compose with static
      # lifetime) ÔÇö those keep their own `Decl` shapes and so won't match here.
      - { lhs: Stmt, rhs: ['static', Type, DeclItemList, ';'], action: stmtStaticDecl }
      # Expression statement uses the full `Expr` tier so `a, b;` (comma
      # operator, result discarded) parses; the visitor splits it into
      # sequential statements.
      - { lhs: Stmt, rhs: [Expr, ';'],                     action: stmtExpr }
      - { lhs: Stmt, rhs: [Block] }
      # `goto label ;` and `label : Stmt` ÔÇö direct lowering, C# accepts
      # identical syntax (and the same forward-reference semantics inside
      # a method body). Empty statement `;` so labels at the end of a
      # block can attach to something (`end: ;` ÔÇö required pre-C23 anyway).
      - { lhs: Stmt, rhs: ['goto', ID, ';'],               action: stmtGoto }
      - { lhs: Stmt, rhs: [ID, ':', Stmt],                 action: stmtLabel }
      - { lhs: Stmt, rhs: ['case', E, ':', Stmt],          action: caseLabel }
      - { lhs: Stmt, rhs: ['default', ':', Stmt],          action: defaultLabel }
      - { lhs: Stmt, rhs: [';'],                           action: stmtEmpty }
      # Block-scope `_Static_assert` ÔÇö same two arities as the file-scope
      # form above. Lowers to a comment (compile-time only).
      - { lhs: Stmt, rhs: ['_Static_assert', '(', E, ',', STRING, ')', ';'], action: staticAssertStmt }
      - { lhs: Stmt, rhs: ['_Static_assert', '(', E, ')', ';'],              action: staticAssertStmtNoMsg }

  # MemberList: one or more `Type ID ;` declarations inside a struct body.
  - derivation: leftmost
    rules:
      - { lhs: MemberList, rhs: [Member, MemberList], action: membersCons }
      - { lhs: MemberList, rhs: [Member],              action: membersOne }

  - derivation: none
    rules:
      - { lhs: Member, rhs: [Type, ID, ';'], action: structMember }
      # Bit-fields `Type ID : width ;` and anonymous padding `Type : width ;`.
      # C# has no bit-fields; dotcc lowers a named bit-field to a FULL field of
      # the declared type (the width is dropped ÔÇö see structBitField), and an
      # anonymous bit-field (padding) to nothing. After `Type ID`, lookahead `:`
      # selects the bit-field over the plain member (`;`); after a bare `Type`,
      # `:` selects the anonymous form.
      - { lhs: Member, rhs: [Type, ID, ':', E, ';'], action: structBitField }
      - { lhs: Member, rhs: [Type, ':', E, ';'],     action: structAnonBitField }

  # EnumList / EnumItem ÔÇö enumerator body for `enum Name { ÔÇª }`.
  - derivation: leftmost
    rules:
      - { lhs: EnumList, rhs: [EnumItem], action: enumListOne }
      - { lhs: EnumList, rhs: [EnumList, ',', EnumItem], action: enumListCons }

  - derivation: none
    rules:
      - { lhs: EnumItem, rhs: [ID], action: enumItem }
      - { lhs: EnumItem, rhs: [ID, '=', E], action: enumItemInit }

  # `case E :` and `default :` as statement-level labels ÔÇö body is a
  # single Stmt (which may itself be a Block, a labeled stmt, a loop, ÔÇª).
  # This matches the C standard "labeled-statement" production and lets
  # cases be sprinkled anywhere inside a switch body. Notably enables
  # Duff's device, where case labels are interleaved into a do-while
  # loop body. Real C also requires the surrounding switch ÔÇö we don't
  # enforce that (Roslyn does, post-lowering).

  - derivation: none
    rules:
      # Multi-declarator: `Type x` / `Type x = E` / `Type x, y` / `Type x = 1, y = 2`.
      # Single-declarator forms are the special case where DeclItemList has
      # one element. The Type prefix is shared across all comma-separated
      # items, matching real C (where `int x, y;` declares two `int`s).
      - { lhs: Decl, rhs: [Type, DeclItemList], action: decl }
      # `auto` declarations (block scope). C23 type inference `auto x = E;` ÔåÆ
      # C# `var` (a plain ID after `auto`); pre-C23 storage-class `auto int x ÔÇª`
      # ÔåÆ drop the `auto` (a type keyword / TYPE_NAME after `auto`). Disjoint
      # via the lexer hack (ID vs TYPE_NAME) + the fact that a Type never starts
      # with a plain ID.
      - { lhs: Decl, rhs: ['auto', ID, '=', E],       action: declAutoInfer }
      - { lhs: Decl, rhs: ['auto', Type, DeclItemList], action: declAutoStorage }
      # Stack-allocated array: `int arr[N]`. Lowers to `int* arr = stackalloc int[N]`
      # so subscript and pointer arithmetic both work naturally in C# `unsafe`
      # blocks. Size must be a compile-time constant or an int expression
      # ÔÇö same constraint C and C# both enforce. Kept as a single-declarator
      # rule because the lowering rewrites the type (T ÔåÆ T*) and the
      # initializer (= stackalloc) ÔÇö doesn't compose with peers in one decl.
      # `int arr[N]` (1-D) and `int a[D1][D2]ÔÇª` (multi-dim). ArrDims collects
      # the dimensions; the visitor flattens a multi-dim array to a single
      # `stackalloc`. Conflict-free with the `ÔÇª '[' E ']' '=' '{' ÔÇª }'` init
      # forms below: `=` is not in FOLLOW(ArrDims), so at `Type ID [ E ]` the
      # parser shifts `=` (init form) or reduces ArrDims (`[`/`;`/`,` lookahead).
      - { lhs: Decl, rhs: [Type, ID, ArrDims], action: declArr }
      # Array with aggregate initializer: `int arr[N] = {1, 2, 3}` (sized) or
      # `int arr[] = {1, 2, 3}` (size derived from init). Both lower to
      # `T* arr = stackalloc T[]{ 1, 2, 3 }`. We reuse ArgList for the brace
      # contents ÔÇö it's a comma-separated expression list, which is exactly
      # the same shape.
      # Array with a brace initializer. The sized form uses ArrDims, so it covers
      # 1-D AND multi-dimensional / nested initializers (`int m[2][3] = {{ÔÇª},{ÔÇª}}`,
      # and struct arrays `struct P pts[2] = {{ÔÇª},{ÔÇª}}`); the visitor flattens a
      # scalar multi-dim init (with C's per-dimension zero-fill) or maps each
      # group to `new T{ÔÇª}` for a struct array. The implicit-size `[]` form is
      # 1-D (size derived from the initializer).
      - { lhs: Decl, rhs: [Type, ID, ArrDims, '=', '{', InitList, '}'], action: declArrInit }
      - { lhs: Decl, rhs: [Type, ID, '[', ']', '=', '{', InitList, '}'], action: declArrInitImplicit }
      # `char s[] = "ÔÇª"` / `char s[N] = "ÔÇª"` ÔÇö char array initialized from a
      # string literal (C89). Decodes the string to bytes and stackalloc's a
      # MUTABLE copy (a bare string literal is a pinned read-only RVA; a char[]
      # is writable). StringSeq ÔåÆ adjacent literals concatenate; the sized form
      # zero-pads to N. Conflict-free with the `{ ÔÇª }` forms above: after `=`,
      # `{` ÔåÆ brace init, a STRING ÔåÆ these. Sized form via ArrDims (shares the
      # dim reduction with declArrInit).
      - { lhs: Decl, rhs: [Type, ID, '[', ']', '=', StringSeq],  action: declCharArrStr }
      - { lhs: Decl, rhs: [Type, ID, ArrDims, '=', StringSeq],   action: declCharArrStrSized }
      # Struct aggregate initializer: `Point p = {1, 2};`. The visitor looks
      # up the struct's field names from a side map populated by StructDef /
      # TypedefStruct / UnionDef, then emits `Point p = new Point { x = 1,
      # y = 2 };` ÔÇö C# requires named members in object initializers (no
      # positional form). Single-declarator only (like declArr*) since the
      # lowering rewrites the initializer shape.
      - { lhs: Decl, rhs: [Type, ID, '=', '{', InitList, '}'], action: declStructInit }
      # Function-pointer declarator (block scope): `int (*fp)(int) [= E];`. The
      # `( * ID )` shape ÔÇö paren, star, name, paren ÔÇö distinguishes it from every
      # other declarator (which start `Type ID`), so it's conflict-free. Lowers
      # to a C# `delegate*<argsÔÇª, ret>` local. (The typedef'd form ÔÇö `typedef
      # int (*Cmp)(int); Cmp fp;` ÔÇö also works and is often cleaner.)
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', '(', ParamList, ')'],            action: declFnPtr }
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', '(', ')'],                       action: declFnPtrNoArgs }
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', '(', ParamList, ')', '=', E],    action: declFnPtrInit }
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', '(', ')', '=', E],               action: declFnPtrNoArgsInit }
      # Pointer-to-array declarator: `int (*p)[3] [= E];` ÔÇö p is a pointer to an
      # array of 3 (e.g. a row pointer into a 2-D array). Same `( * ID )` shape as
      # the fn-ptr declarator but with `[dims]` instead of `(params)` after the
      # `)`, so the `[` vs `(` lookahead keeps them disjoint. Lowers to a flat C#
      # pointer that subscripts with the array's stride (reuses the multi-dim
      # machinery); `sizeof` of it is the pointer size.
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', ArrDims],          action: declPtrToArr }
      - { lhs: Decl, rhs: [Type, '(', '*', ID, ')', ArrDims, '=', E],  action: declPtrToArrInit }
      # Designated initializer (C99): `Point p = { .x = 1, .y = 2 };`. The
      # user names the fields directly ÔÇö no _structFields lookup needed at
      # emit time. LALR(1)-distinguished from the positional form by the
      # leading `.` after `{`.
      - { lhs: Decl, rhs: [Type, ID, '=', '{', MemberInitList, '}'], action: declStructDesignated }

  # ArrDims ÔÇö one or more `[ E ]` array dimensions, left-recursive.
  - derivation: leftmost
    rules:
      - { lhs: ArrDims, rhs: [ArrDims, '[', E, ']'], action: arrDimsCons }
      - { lhs: ArrDims, rhs: ['[', E, ']'],          action: arrDimsOne }

  # DeclItemList: comma-separated list of declarators sharing a leading Type.
  - derivation: leftmost
    rules:
      - { lhs: DeclItemList, rhs: [DeclItem], action: declItemListOne }
      - { lhs: DeclItemList, rhs: [DeclItemList, ',', DeclItem], action: declItemListCons }

  - derivation: none
    rules:
      - { lhs: DeclItem, rhs: [ID], action: declItem }
      - { lhs: DeclItem, rhs: [ID, '=', E], action: declItemInit }

  # MemberInitList ÔÇö one or more `.field = E` items, comma-separated, optional
  # trailing comma (`{ .x = 1, .y = 2, }`). Left-recursive, so the trailing-
  # comma rule is conflict-free.
  - derivation: leftmost
    rules:
      - { lhs: MemberInitList, rhs: [MemberInit], action: memberInitListOne }
      - { lhs: MemberInitList, rhs: [MemberInitList, ',', MemberInit], action: memberInitListCons }
      - { lhs: MemberInitList, rhs: [MemberInitList, ','], action: memberInitListTrail }

  # InitList ÔÇö brace-initializer element list with an optional trailing comma.
  # Left-recursive (clean trailing-comma). An element (InitElem) is a scalar
  # expression OR a nested `{ ÔÇª }` group, so the whole list reduces to a
  # recursive InitNode tree (an InitGroup) ÔÇö nested aggregate initializers like
  # `{{1,2},{3,4}}` keep their structure for the decl visitors to interpret.
  - derivation: leftmost
    rules:
      - { lhs: InitList, rhs: [InitElem], action: initListOne }
      - { lhs: InitList, rhs: [InitList, ',', InitElem], action: initListCons }
      - { lhs: InitList, rhs: [InitList, ','], action: initListTrail }

  - derivation: none
    rules:
      - { lhs: InitElem, rhs: [E],                  action: initElemExpr }
      - { lhs: InitElem, rhs: ['{', InitList, '}'], action: initElemNest }

  - derivation: none
    rules:
      - { lhs: MemberInit, rhs: ['.', ID, '=', E], action: memberInit }

  # Comma operator ÔÇö the full-expression tier above assignment. Left-assoc,
  # lowest precedence. `Expr ÔåÆ E` is the no-comma passthrough; `Expr ÔåÆ Expr , E`
  # is the operator. Only `( Expr )` (Primary) and `Expr ;` (stmtExpr) use Expr,
  # so call-argument / initializer commas (on `E`) stay separators.
  - derivation: leftmost
    rules:
      - { lhs: Expr, rhs: [Expr, ',', E], action: commaOp }
      - { lhs: Expr, rhs: [E] }

  # Assignment (incl. compound) is right-associative ÔÇö all E rules share the
  # rightmost group so on lookahead `=`/`+=`/... at state `[..LOr]` the
  # parser shifts. Compound assigns lower to `(lhs OP= rhs)` literally ÔÇö
  # C# has the same operators with identical semantics.
  - derivation: rightmost
    rules:
      - { lhs: E, rhs: [LOr, '=',  E], action: assign }
      - { lhs: E, rhs: [LOr, '+=', E], action: addAssign }
      - { lhs: E, rhs: [LOr, '-=', E], action: subAssign }
      - { lhs: E, rhs: [LOr, '*=', E], action: mulAssign }
      - { lhs: E, rhs: [LOr, '/=', E], action: divAssign }
      - { lhs: E, rhs: [LOr, '%=', E], action: modAssign }
      - { lhs: E, rhs: [LOr, '&=',  E], action: andAssign }
      - { lhs: E, rhs: [LOr, '|=',  E], action: orAssign  }
      - { lhs: E, rhs: [LOr, '^=',  E], action: xorAssign }
      - { lhs: E, rhs: [LOr, '<<=', E], action: shlAssign }
      - { lhs: E, rhs: [LOr, '>>=', E], action: shrAssign }
      # Ternary `c ? a : b` ÔÇö between LOr and assignment in real C precedence.
      # Both branches are `E` so nested ternaries chain right-associative,
      # matching C. Cond.B wraps the C-truthy condition at emit time.
      - { lhs: E, rhs: [LOr, '?', E, ':', E], action: ternary }
      - { lhs: E, rhs: [LOr] }

  - derivation: leftmost
    rules:
      - { lhs: LOr, rhs: [LOr, '||', LAnd], action: lor }
      - { lhs: LOr, rhs: [LAnd] }

  - derivation: leftmost
    rules:
      # `&&` lowers from LAnd to BOr (was Equ pre-bitwise); the ladder now
      # passes through the four bitwise tiers before reaching Equ.
      - { lhs: LAnd, rhs: [LAnd, '&&', BOr], action: land }
      - { lhs: LAnd, rhs: [BOr] }

  - derivation: leftmost
    rules:
      - { lhs: BOr,  rhs: [BOr, '|', BXor], action: bOr }
      - { lhs: BOr,  rhs: [BXor] }

  - derivation: leftmost
    rules:
      - { lhs: BXor, rhs: [BXor, '^', BAnd], action: bXor }
      - { lhs: BXor, rhs: [BAnd] }

  - derivation: leftmost
    rules:
      # Bitwise AND. `&` is already a Unary op (addrOf); the lexer emits one
      # `&` token and the parser disambiguates by context ÔÇö binary at this
      # precedence vs unary in `Unary`. LALR(1) handles this cleanly because
      # the LHS of `BAnd & Equ` is BAnd (already-reduced expr) whereas the
      # unary `& Unary` only fires when there's no left-hand expression yet.
      - { lhs: BAnd, rhs: [BAnd, '&', Equ], action: bAnd }
      - { lhs: BAnd, rhs: [Equ] }

  - derivation: leftmost
    rules:
      - { lhs: Equ, rhs: [Equ, '==', Rel], action: eq }
      - { lhs: Equ, rhs: [Equ, '!=', Rel], action: neq }
      - { lhs: Equ, rhs: [Rel] }

  - derivation: leftmost
    rules:
      - { lhs: Rel, rhs: [Rel, '<',  Shift], action: lt }
      - { lhs: Rel, rhs: [Rel, '>',  Shift], action: gt }
      - { lhs: Rel, rhs: [Rel, '<=', Shift], action: le }
      - { lhs: Rel, rhs: [Rel, '>=', Shift], action: ge }
      - { lhs: Rel, rhs: [Shift] }

  - derivation: leftmost
    rules:
      - { lhs: Shift, rhs: [Shift, '<<', Add], action: shl }
      - { lhs: Shift, rhs: [Shift, '>>', Add], action: shr }
      - { lhs: Shift, rhs: [Add] }

  - derivation: leftmost
    rules:
      - { lhs: Add, rhs: [Add, '+', Mul], action: add }
      - { lhs: Add, rhs: [Add, '-', Mul], action: sub }
      - { lhs: Add, rhs: [Mul] }

  - derivation: leftmost
    rules:
      - { lhs: Mul, rhs: [Mul, '*', Unary], action: mul }
      - { lhs: Mul, rhs: [Mul, '/', Unary], action: div }
      - { lhs: Mul, rhs: [Mul, '%', Unary], action: mod }
      - { lhs: Mul, rhs: [Unary] }

  # Unary operators are right-associative: `--x` is `-(-x)`, `**p` is `*(*p)`.
  # Cast `(Type) Unary` lives here too so its precedence matches real C
  # (binds tighter than mul/div, looser than postfix calls). Disambiguates
  # from `Primary -> '(' E ')'` by lookahead: after `(`, a Type-starting
  # keyword (int/char/float/double/void) ÔåÆ cast; anything else ÔåÆ paren-expr.
  - derivation: rightmost
    rules:
      - { lhs: Unary, rhs: ['*',  Unary], action: deref }
      - { lhs: Unary, rhs: ['&',  Unary], action: addrOf }
      - { lhs: Unary, rhs: ['-',  Unary], action: neg }
      - { lhs: Unary, rhs: ['~',  Unary], action: bNot }
      # Logical `!` ÔÇö C-truthy NOT. Lowers to `(Cond.B(E) ? 0 : 1)` so the
      # result is int (matching C: `!x` yields 0 or 1, never bool).
      - { lhs: Unary, rhs: ['!',  Unary], action: lNot }
      # Prefix ++/-- ÔÇö right-associative like the rest of Unary. C and C#
      # both forbid stacking (`++++x` doesn't compile in either), but the
      # grammar lets them stack and the C# compiler will diagnose.
      - { lhs: Unary, rhs: ['++', Unary], action: preInc }
      - { lhs: Unary, rhs: ['--', Unary], action: preDec }
      - { lhs: Unary, rhs: ['(', Type, ')', Unary], action: cast }
      # `sizeof(Type)` ÔÇö emits C# `sizeof(T)` which works for unmanaged types
      # in unsafe context. All dotcc structs are unmanaged (only primitive
      # and pointer fields) so this is always valid.
      - { lhs: Unary, rhs: ['sizeof', '(', Type, ')'], action: sizeofType }
      # `sizeof expr` ÔÇö the operand's synthesized CType (propagated up through
      # EmitContent) gives the size. Conflict-free with `sizeof ( Type )`: the
      # TypeNameRewriter has already split `sizeof ( ID )` (parenthesized expr,
      # ID is not a TYPE_NAME) from `sizeof ( int )` / `sizeof ( typedefName )`
      # before the parser ever sees them ÔÇö same lexer hack the cast rule relies on.
      - { lhs: Unary, rhs: ['sizeof', Unary], action: sizeofExpr }
      - { lhs: Unary, rhs: [Postfix] }

  - derivation: leftmost
    rules:
      - { lhs: Postfix, rhs: [Postfix, '(', ArgList, ')'], action: call }
      - { lhs: Postfix, rhs: [Postfix, '(', ')'],            action: callNoArgs }
      # Postfix ++/-- ÔÇö left-associative (chained `x++` then `++` is illegal
      # in C and C# both; the grammar permits but the downstream compiler
      # diagnoses).
      - { lhs: Postfix, rhs: [Postfix, '++'],                 action: postInc }
      - { lhs: Postfix, rhs: [Postfix, '--'],                 action: postDec }
      # Subscript `expr[i]`. Lowers to the same syntax in C# ÔÇö pointer
      # subscript desugars to `*(expr + i)` per the language spec, same as C.
      - { lhs: Postfix, rhs: [Postfix, '[', E, ']'],          action: subscript }
      # Member access on a struct value (`s.f`) or struct pointer (`p->f`).
      # C# accepts both `.` and `->` with identical semantics in unsafe
      # contexts (which is where all dotcc-emitted user code lives).
      - { lhs: Postfix, rhs: [Postfix, '.',  ID],             action: memberDot }
      - { lhs: Postfix, rhs: [Postfix, '->', ID],             action: memberArrow }
      - { lhs: Postfix, rhs: [Primary] }

  - derivation: none
    rules:
      - { lhs: Primary, rhs: [ID],          action: var }
      - { lhs: Primary, rhs: [NUM],         action: num }
      - { lhs: Primary, rhs: [FLOAT],       action: flt }
      # Adjacent string literals concatenate (`"a" "b"` ÔåÆ `"ab"`). StringSeq
      # folds the run; `str` decodes + emits once.
      - { lhs: Primary, rhs: [StringSeq],   action: str }
      # `'a'`, `'\n'` etc. ÔÇö C char literal. In C the value has type int
      # but is conventionally assigned to char/byte; we lower to `(byte)'a'`
      # since our `char` is `byte`. Escape processing happens in the visitor.
      - { lhs: Primary, rhs: [CHAR],        action: chr }
      # C23 keyword constants. The terminals only ever arrive here via
      # DialectKeywordRewriter's c23 promotion (no lexer rule), so these
      # productions are unreachable under < c23 ÔÇö pre-C23 `true`/`false`/
      # `nullptr` stay ID and route through `Primary -> ID` (action var),
      # where <stdbool.h>/<stddef.h> macros supply the value.
      - { lhs: Primary, rhs: ['TRUE'],      action: litTrue }
      - { lhs: Primary, rhs: ['FALSE'],     action: litFalse }
      - { lhs: Primary, rhs: ['NULLPTR'],   action: litNullptr }
      # Parenthesized expression uses the full `Expr` tier, so `( a, b )` is the
      # comma operator. (Cast `( Type ) Unary` still disambiguates by the first
      # token after `(`; function calls use `ArgList`, not `Expr`.)
      - { lhs: Primary, rhs: ['(', Expr, ')'], action: paren }

  - derivation: leftmost
    rules:
      - { lhs: ArgList, rhs: [E, ',', ArgList], action: argsCons }
      - { lhs: ArgList, rhs: [E],                action: argsOne }

  # Adjacent string-literal concatenation. Left-recursive: a run of `STRING`
  # tokens folds into one StringSeq, which `Primary ÔåÆ StringSeq` lowers.
  - derivation: leftmost
    rules:
      - { lhs: StringSeq, rhs: [StringSeq, STRING], action: strSeqCons }
      - { lhs: StringSeq, rhs: [STRING],             action: strSeqOne }

lexer:
  root:
    # Preprocessor directives ÔÇö single-token matches. Longest-match in the byte
    # DFA picks `#include` over any prefix; first-rule-wins handles ties.
    # Order matters here too: `#ifndef` and `#ifdef` need to precede `#if`
    # since they share the prefix and on identical-length ambiguity the
    # earlier rule wins (and longest-match picks the longer string anyway).
    - { symbol: '#ifndef',  match: '#ifndef' }
    - { symbol: '#ifdef',   match: '#ifdef' }
    # `#elif` before `#else` ÔÇö they don't share a prefix but `#elif` and
    # `#endif` both start with `#e`; longest-match handles it.
    - { symbol: '#elif',    match: '#elif' }
    - { symbol: '#if',      match: '#if' }
    - { symbol: '#else',    match: '#else' }
    - { symbol: '#endif',   match: '#endif' }
    - { symbol: '#include', match: '#include' }
    - { symbol: '#define',  match: '#define' }
    - { symbol: '#undef',   match: '#undef' }
    # `#warning` must precede `#pragma` if any prefix sharing; no shared
    # prefix here so order is just cosmetic.
    - { symbol: '#pragma',  match: '#pragma' }
    - { symbol: '#warning', match: '#warning' }
    - { symbol: '#error',   match: '#error' }
    # In-body operators: `##` (token paste) must precede `#` (stringify)
    # so longest-match picks the two-char form first. Both come AFTER all
    # the directive rules so `#define` etc. still win on longer matches.
    - { symbol: '##',       match: '##' }
    - { symbol: '#',        match: '#' }

    # Block comments ÔÇö must precede the `/` operator rule so the slash isn't
    # eaten first. The regex avoids alternation (IRx has no `|`):
    #   /\*  [^*]*  ( \* [^/] [^*]* )*  \*+ /
    # = `/*` then non-stars then (single `*` not followed by `/` then more
    # non-stars)* then one-or-more `*` then `/`. Classic C-comment regex
    # rendered without alternation; handles `/**/`, `/* x */`, `/** comment **/`.
    - { symbol: BLOCK_COMMENT, match: '/\*[^*]*(\*[^/][^*]*)*\*+/', action: ignore }

    # Line comments. Ignored.
    - { symbol: LINE_COMMENT, match: '//[^\n]*', action: ignore }

    # Keywords first ÔÇö first-rule-wins on ties with identifier (e.g. `int` is 3
    # chars matching both `int` keyword and `[a-zA-Z_]...` identifier; keyword
    # wins because it sits earlier).
    - { symbol: 'int',    match: 'int' }
    - { symbol: 'char',   match: 'char' }
    - { symbol: 'float',  match: 'float' }
    - { symbol: 'double', match: 'double' }
    - { symbol: 'void',   match: 'void' }
    - { symbol: 'short',    match: 'short' }
    - { symbol: 'long',     match: 'long' }
    - { symbol: 'unsigned', match: 'unsigned' }
    - { symbol: 'signed',   match: 'signed' }
    - { symbol: 'const',    match: 'const' }
    - { symbol: 'volatile', match: 'volatile' }
    # `restrict` + its GNU spellings, all the same token. __restrict__ before
    # __restrict (longest-match) before restrict.
    - { symbol: 'restrict', match: '__restrict__' }
    - { symbol: 'restrict', match: '__restrict' }
    - { symbol: 'restrict', match: 'restrict' }
    - { symbol: 'goto',     match: 'goto' }
    # `_Bool` must come BEFORE the ID rule so it lexes as a keyword rather
    # than identifier. C99 reserves the underscore-uppercase prefix; the
    # nicer `bool` lives in <stdbool.h> as a #define that expands here.
    - { symbol: '_Bool',    match: '_Bool' }
    # C23 `_Float128` and its GNU alias `__float128` both lex to the one
    # `_Float128` grammar symbol. Underscore-uppercase prefix is reserved, so
    # no dialect gating needed ÔÇö like `_Bool`, these are always keywords.
    # Before the ID rule (longest-match ties resolve first-rule-wins).
    - { symbol: '_Float128', match: '_Float128' }
    - { symbol: '_Float128', match: '__float128' }
    # `_Static_assert` (C11) ÔÇö always a keyword (reserved underscore-uppercase
    # prefix). The C23 lowercase `static_assert` is promoted onto this terminal
    # by DialectKeywordRewriter; it has no lexer rule of its own (rule 2).
    - { symbol: '_Static_assert', match: '_Static_assert' }
    - { symbol: 'if',     match: 'if' }
    - { symbol: 'else',   match: 'else' }
    - { symbol: 'while',  match: 'while' }
    - { symbol: 'return', match: 'return' }
    - { symbol: 'break',    match: 'break' }
    - { symbol: 'continue', match: 'continue' }
    - { symbol: 'for',      match: 'for' }
    - { symbol: 'switch',   match: 'switch' }
    - { symbol: 'case',     match: 'case' }
    - { symbol: 'default',  match: 'default' }
    - { symbol: 'struct',   match: 'struct' }
    - { symbol: 'sizeof',   match: 'sizeof' }
    - { symbol: 'typedef',  match: 'typedef' }
    - { symbol: 'do',       match: 'do' }
    - { symbol: 'enum',     match: 'enum' }
    - { symbol: 'union',    match: 'union' }
    - { symbol: 'static',   match: 'static' }
    - { symbol: 'extern',   match: 'extern' }
    - { symbol: 'auto',     match: 'auto' }

    # Multi-char operators. Longest-match handles `==` vs `=`, `<=` vs `<`, etc.
    # so the ordering doesn't strictly matter ÔÇö listed multi-char first for
    # readability.
    - { symbol: '==', match: '==' }
    - { symbol: '!=', match: '!=' }
    - { symbol: '<=', match: '<=' }
    - { symbol: '>=', match: '>=' }
    - { symbol: '&&', match: '&&' }
    - { symbol: '||', match: '\|\|' }
    # Multi-char inc/dec and compound assignment. Listed before their
    # single-char counterparts so longest-match (and first-rule-on-tie)
    # picks the multi-char form. `++ -- += -= *= /= %=`.
    - { symbol: '++', match: '\+\+' }
    - { symbol: '--', match: '\-\-' }
    - { symbol: '+=', match: '\+=' }
    - { symbol: '-=', match: '\-=' }
    - { symbol: '*=', match: '\*=' }
    - { symbol: '/=', match: '/=' }
    - { symbol: '%=', match: '%=' }
    # Bitwise compound first (longest-match: `<<=` before `<<` before `<=`).
    - { symbol: '<<=', match: '<<=' }
    - { symbol: '>>=', match: '>>=' }
    - { symbol: '&=',  match: '&=' }
    - { symbol: '|=',  match: '\|=' }
    - { symbol: '^=',  match: '\^=' }
    # Then bitwise shifts (two-char) before single-char `<` / `>`.
    - { symbol: '<<',  match: '<<' }
    - { symbol: '>>',  match: '>>' }
    # Arrow operator before single-char `-` and `>` (longest-match).
    - { symbol: '->',  match: '\->' }

    # Single-char operators and punctuation.
    - { symbol: '=', match: '=' }
    - { symbol: '<', match: '<' }
    - { symbol: '>', match: '>' }
    - { symbol: '+', match: '\+' }
    - { symbol: '-', match: '\-' }
    - { symbol: '*', match: '\*' }
    - { symbol: '/', match: '/' }
    - { symbol: '%', match: '%' }
    - { symbol: '&', match: '&' }
    - { symbol: '|', match: '\|' }
    - { symbol: '^', match: '\^' }
    - { symbol: '~', match: '~' }
    - { symbol: '(', match: '\(' }
    - { symbol: ')', match: '\)' }
    - { symbol: '{', match: '\{' }
    - { symbol: '}', match: '\}' }
    - { symbol: '[', match: '\[' }
    - { symbol: ']', match: '\]' }
    - { symbol: ';', match: ';' }
    - { symbol: ',', match: ',' }
    - { symbol: ':', match: ':' }
    - { symbol: '?', match: '\?' }
    # `!=` must lex before `!` (longest-match) ÔÇö but `!=` already lives in
    # the multi-char block above, so single `!` here is safe.
    - { symbol: '!', match: '!' }

    # Varargs marker `...` (three literal dots). MUST precede the single
    # `.` member-access rule below ÔÇö longest-match picks `...` over `.`,
    # but listing this first removes any ambiguity on first-rule-wins ties.
    - { symbol: '...', match: '\.\.\.' }
    - { symbol: '.',   match: '\.' }

    # Literals. FLOAT BEFORE NUM so longest-match picks float for `123.5`
    # (NUM would match just `123` otherwise). FLOAT requires a mandatory
    # decimal point to disambiguate cleanly from NUM ÔÇö `123` is INT, `123.0`
    # is FLOAT. Suffixed form `123.5f` / `123.5F` first (longest match);
    # un-suffixed second. Both passthrough to C# numeric literal syntax,
    # which accepts `f`/`F`. (Real C also accepts `L` for long double; we
    # skip that since C# has no `L` suffix on floats.)
    # STRING used both by #include args and as in-expression literals via
    # the `Primary -> STRING` production. Pattern:
    #   open quote, then ( escape-pair OR any-non-quote-non-backslash )* , then close quote.
    # IRxParser doesn't support `.` as wildcard, so the escape continuation
    # is an explicit character class of the C standard escape chars.
    # Relies on alternation `|` in IRxParser, added upstream in LALR.CC.
    - { symbol: STRING, match: '"(\\["\\nrtbf0v''/aex0-9]|[^"\\])*"' }
    # Char literal: IRx has no `.` (any-char) operator ÔÇö it parses `.` as
    # literal. Use a char class on the inner byte instead. Rules are longest-
    # match, so the multi-byte escape forms (hex `'\xNN'`, 2/3-digit octal
    # `'\NN'`/`'\NNN'`) precede the single-escape and plain forms. The simple-
    # escape class covers the named escapes (\a \b \e \f \n \r \t \v \0 \\ \' \"
    # \?) AND single-digit octal (\0ÔÇô\7). The Chr visitor decodes the escape to
    # its byte value and lowers to `(byte)N` (or `(byte)'c'` for a plain char).
    - { symbol: CHAR,   match: '''\\x[0-9a-fA-F]+''' }
    - { symbol: CHAR,   match: '''\\[0-7][0-7][0-7]''' }
    - { symbol: CHAR,   match: '''\\[0-7][0-7]''' }
    - { symbol: CHAR,   match: '''\\[abefnrtv0-7\\''"?]''' }
    - { symbol: CHAR,   match: '''[^''\\]''' }
    - { symbol: FLOAT,  match: '[0-9]+\.[0-9]+([eE][+\-]?[0-9]+)?[fF]' }
    - { symbol: FLOAT,  match: '[0-9]+\.[0-9]+([eE][+\-]?[0-9]+)?' }
    # Integer literals ÔÇö with optional C int-suffix (u/U/l/L combinations).
    # Suffixed variants listed FIRST so longest-match picks them when the
    # suffix is present. The Num visitor normalizes C suffixes (l/ll/ul/ull/
    # case-insensitive) to C# equivalents (L/UL).
    # Digit runs allow C23 single-quote digit separators between digits
    # (`1'000'000`, `0xFF'FF`): `D('?D)*` ÔÇö a `'` may sit only between two
    # digits, never leading/trailing/doubled. The Num visitor strips them (and
    # gates them as C23). Suffixed forms first so longest-match takes the suffix.
    - { symbol: NUM,    match: '0[xX][0-9a-fA-F](''?[0-9a-fA-F])*[uUlL]+' }
    # C23 binary literal, suffixed form (`0b1010ul`). Before the decimal rule so
    # longest-match picks the full `0bÔÇª` over a bare leading `0`. C# accepts the
    # `0b` syntax verbatim, so the Num visitor passes it through (gated as C23).
    - { symbol: NUM,    match: '0[bB][01](''?[01])*[uUlL]+' }
    - { symbol: NUM,    match: '[0-9](''?[0-9])*[uUlL]+' }
    # Hex literal ÔÇö listed before NUM so longest-match (`0xFF` > `0`) picks
    # it. C# accepts the same `0x`-prefixed syntax, so the Num visitor just
    # passes the raw content through unchanged.
    - { symbol: NUM,    match: '0[xX][0-9a-fA-F](''?[0-9a-fA-F])*' }
    - { symbol: NUM,    match: '0[bB][01](''?[01])*' }
    # Decimal ÔÇö also matches a C `0`-prefixed OCTAL constant (`0755`); C# has no
    # octal literal syntax (a leading 0 there is just decimal), so the Num
    # visitor converts the octal value rather than emit it verbatim.
    - { symbol: NUM,    match: '[0-9](''?[0-9])*' }
    - { symbol: ID,     match: '[a-zA-Z_][a-zA-Z_0-9]*' }

    # Whitespace + newlines: ignored. The preprocessor uses SourcePosition.Line
    # to detect directive line boundaries ÔÇö which the byte-DFA lexer populates
    # whether or not WS is ignored, so this works.
    - { symbol: WS, match: '[ \t\r\n]+', action: ignore }

# Preprocessor declaration. The source generator turns this block into:
#   public interface IPreprocessor {
#       IEnumerable<Item> OnInclude(IReadOnlyList<Item> args);
#       IEnumerable<Item> OnDefine(IReadOnlyList<Item> args);
#       IEnumerable<Item> OnUndef(IReadOnlyList<Item> args);
#       IEnumerable<Item> Rewrite(Item token);
#       bool IsDefined(string name);     // for #ifdef / #ifndef
#   }
# plus BuildPreprocessor() / WrapPreprocessor() helpers. The `conditionals:`
# block tells the framework which directives belong to the built-in
# conditional-compilation engine (the user doesn't implement those ÔÇö the
# runtime tracks the #if/#endif stack and suppresses tokens in false branches
# automatically, consulting `IsDefined` for #ifdef/#ifndef).
preprocessor:
  directives:
    '#include': onInclude
    '#define':  onDefine
    '#undef':   onUndef
    '#pragma':  onPragma
    '#error':   onError
    '#warning': onWarning
  conditionals:
