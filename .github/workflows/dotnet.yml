name: ci

# CI for dotcc — the C → .NET 10 / C# transpiler.
#
# Mirrors the SharpAstro org convention (see sharpastro/LALR.CC's dotnet.yml):
# ubuntu-latest, setup-dotnet 10.0.x, and explicit restore → build --no-restore
# → test --no-build as SEPARATE steps. Keeping build and the test host in
# distinct, sequential processes structurally avoids the documented Windows
# flake where a test host racing a concurrent build deadlocks on the
# LALR.CC.dll copy lock — which is why the org defaults to ubuntu-latest.
#
# dotcc additionally runs a windows-latest job (build-test-windows). dotcc's
# libc runtime takes the OS-switch path in several primitives (link →
# CreateHardLinkW, getppid → toolhelp snapshot, getrusage → GetProcessTimes +
# psapi, kill → OpenProcess/TerminateProcess, …); those WINDOWS branches never
# execute on a Linux runner, so without a Windows job they'd ship untested. The
# Windows job reuses the same separate restore→build→test step structure, so it
# stays clear of the LALR.CC.dll copy-lock flake the org switched away from.
#
# dotcc ships no NuGet package, so there is no PACK job (unlike LALR.CC). It does,
# though, publish the clang-shaped `dotcc` exe as NativeAOT (PublishAot=true), and
# nothing else here exercises the EXE's ILC closure — shared-lib-oracle drives ILC
# only for the -shared .so. So an aot-publish job below publishes + smoke-tests the
# exe to catch trim/AOT regressions (the periodic `dotnet publish` check CLAUDE.md
# asks for), which is a distinct ILC entry point from the .so round-trip.
#
# In CI the sibling LALR.CC working copy is absent, so Directory.Build.props
# auto-selects NuGet mode; we still pass -p:UseLocalLalrCc=false to pin that
# intent (CLAUDE.md: "CI always builds the NuGet path").
#
# Jobs:
#   build-test          — the required Linux gate: Release build + unit suite +
#                 functional fixtures. The opt-in differential oracles (MSVC /
#                 gcc-WSL / gcc-quad / wat) skip cleanly here; the wat oracle,
#                 which is this branch's whole point, gets its own job below.
#   build-test-windows  — same build + unit + functional suite on windows-latest
#                 (x64), so the OS-switch Win32 branches in DotCC.Libc get real
#                 coverage.
#   build-test-windows-arm64 — the same suite on windows-11-arm: win-arm64 is the
#                 maintainer's dev arch, and exercises the blittable struct interop
#                 (pointer width / struct packing) where arm64 could differ.
#   msvc-oracle — the cl.exe differential oracle (windows-latest, x64): compile +
#                 run each fixture with MSVC and assert it matches dotcc's emit and
#                 the committed snapshot. Can't run on Linux (no cl.exe). LP64-vs-
#                 LLP64 / MSVC-C-mode-gap fixtures opt out via no-msvc-oracle.txt.
#   gcc-oracle  — the gcc differential oracle, on NATIVE Linux gcc (matrix:
#                 ubuntu-latest x64 + ubuntu-24.04-arm). The GccWslOracle now picks
#                 its transport by host — native `bash`/`gcc` on Linux, `wsl.exe` on
#                 the maintainer's Windows box — so the same oracle that runs locally
#                 runs in CI here. gcc is dotcc's closest ABI twin (LP64), so it
#                 needs the fewest opt-outs (long-double-width fixtures, e.g.
#                 float-limits, opt out via no-gcc-oracle.txt). Both arches run so a
#                 width/packing divergence on arm64 can't hide.
#   wat-oracle  — the --target=wat EXECUTION oracle: EmitWat → wat2wasm → node.
#                 Pins + checksum-verifies wabt and pins Node so the run is
#                 reproducible; asserts both tools are actually present (the
#                 oracle skips silently when a tool is missing, so without this
#                 guard a broken install would make the job pass without ever
#                 running the oracle); and runs single-threaded (-parallel none)
#                 so 50+ concurrent wat2wasm/node spawns can't contend. Correct
#                 and non-flaky over fast.
#   shared-lib-oracle — the native shared-library round-trip oracle (ubuntu-latest):
#                 dotcc -shared a C lib -> NativeAOT publish to a real .so -> a
#                 hand-written C consumer links it and calls the [UnmanagedCallersOnly]
#                 cdecl exports through the plain C ABI. The end-to-end proof that the
#                 export ABI works from C; LibraryModeTests only checks the managed
#                 export metadata. Installs clang + zlib1g-dev (the NativeAOT linker
#                 deps); opt-in via DOTCC_RUN_SHARED_LIB_ORACLE=1.
#   zig-oracle  — the Zig front-end differential oracle (ubuntu-latest, x86_64):
#                 compile + run each .zig program with the REAL zig compiler and assert
#                 dotcc's Zig path agrees on exit code AND stdout (extern-fn libc cases
#                 link -lc). The zig install is FORKED (inlined download + sha256-verify
#                 + version assert), never a third-party setup-zig action. Pinned to the
#                 DURABLE tagged release 0.16.0 (dev/master tarballs are GC'd off
#                 ziglang.org/builds; the grammar tracks 0.17-dev but the test set is
#                 stable-core syntax both accept). Opt-in via DOTCC_RUN_ZIG_ORACLE=1.
#   zig-oracle-windows — the same differential on windows-latest (x86_64): exercises
#                 zig's Windows `-lc` (MSVC CRT) link + the OS-agnostic ZigOracle
#                 transport (direct zig spawn, no WSL hop). windows-11-arm is
#                 deliberately omitted: zig 0.16.0's aarch64-windows build segfaults on
#                 build-exe (the x86_64 build is fine) — arm64 emit/grammar coverage
#                 still rides build-test-windows-arm64.
#   aot-publish — NativeAOT-publish the clang-shaped `dotcc` exe (PublishAot fires
#                 only on `dotnet publish`, never on build/test), then smoke-test the
#                 PUBLISHED binary end-to-end: a no-input run must give the clang-shaped
#                 error (proves CLI wiring survives trimming), and a real C -> C# emit
#                 must produce a file-based program (proves the compiler path — LALR
#                 tables, preprocessor, backend — works AOT). This is the only job that
#                 covers the exe's ILC closure; a trim/reflection regression fails the
#                 publish (analyzer diagnostics are errors under PublishAot) or the smoke
#                 test rather than shipping silently. clang + zlib1g-dev are the ILC
#                 linker deps (same toolchain shared-lib-oracle installs).

on:
  # push runs only on the default branch (i.e. merges). Feature-branch commits are
  # covered by the pull_request trigger below, which re-fires on every push to an open
  # PR — so a PR'd branch runs each suite ONCE, not twice (a feat/** push + the PR).
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  build-test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Same separate restore → build --no-restore → test --no-build structure
      # as build-test: that's what keeps Windows clear of the test-host-vs-build
      # LALR.CC.dll copy-lock deadlock the org switched to ubuntu to avoid.
      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  build-test-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # win-arm64 is the maintainer's dev arch. Same separate-steps structure as
      # the x64 job. Covers the OS-switch Win32 branches AND the blittable struct
      # interop (PROCESSENTRY32 nuint fields, fixed buffers) on arm64, where
      # struct packing / pointer width could differ from x64.
      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  wat-oracle:
    runs-on: ubuntu-latest
    env:
      WABT_VERSION: '1.0.36'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wabt ${{ env.WABT_VERSION }} (pinned + checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/WebAssembly/wabt/releases/download/${WABT_VERSION}"
          asset="wabt-${WABT_VERSION}-ubuntu-20.04.tar.gz"
          curl -fsSL "$base/$asset" -o "/tmp/$asset"
          curl -fsSL "$base/$asset.sha256" -o "/tmp/$asset.sha256"
          (cd /tmp && sha256sum -c "$asset.sha256")
          tar -xzf "/tmp/$asset" -C /tmp
          echo "/tmp/wabt-${WABT_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain present (fail rather than let the oracle skip)
        run: |
          set -euo pipefail
          wat2wasm --version
          node --version

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Wat execution oracle (single-threaded)
        env:
          DOTCC_RUN_WAT: '1'
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo -- -parallel none

  msvc-oracle:
    runs-on: windows-latest
    env:
      DOTCC_RUN_MSVC_ORACLE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Mirror MsvcOracle.ProbeVswhere exactly: the fixed-path vswhere (NOT PATH),
      # the same -requires VC.Tools.x86.x64 query, and the vcvars64.bat existence
      # check. If this passes, MsvcOracle.IsAvailable is true and the oracle runs
      # for real — so the oracle can't pass by silently skipping every fixture
      # (the failure mode the wat-oracle guard also guards against).
      - name: Verify MSVC present (fail rather than let the oracle silently skip)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere not found at $vswhere" }
          $vc = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vc)) { throw "vswhere found no VC.Tools.x86.x64 install" }
          $vcvars = Join-Path $vc 'VC\Auxiliary\Build\vcvars64.bat'
          if (-not (Test-Path $vcvars)) { throw "vcvars64.bat missing at $vcvars" }
          Write-Host "VC toolset at $vc"

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      # cl.exe-per-fixture differential: asserts dotcc's emit matches MSVC's real
      # output AND the committed snapshot. LP64-vs-LLP64 / MSVC-C-mode-gap
      # fixtures opt out via no-msvc-oracle.txt sidecars.
      - name: MSVC differential oracle (cl.exe per fixture)
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo --filter "FullyQualifiedName~MsvcOracleTests"

  gcc-oracle:
    # Native Linux gcc on both arches. GccWslOracle.RunShell uses `bash -lc`
    # directly here (the `wsl.exe` hop is the Windows-only branch), so the same
    # oracle the maintainer runs locally runs in CI. fail-fast off so an arm64
    # divergence doesn't cancel the x64 leg (and vice versa).
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.runner }}
    env:
      DOTCC_RUN_GCC_ORACLE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # #embed / __has_embed are C23 and gcc implements them only from gcc 15
      # (GCC 15.1, Apr 2025); the stock runner images ship gcc 13. Install gcc 15
      # from the toolchain PPA and make it the default `gcc` (the oracle invokes
      # bare `gcc`), so the embed-basic C23 differential runs FOR REAL here
      # instead of skipping via its min-gcc.txt gate. Assert the major is 15 —
      # fail loudly rather than let an older gcc slip through and silently skip
      # embed-basic (the same no-silent-skip philosophy as the wat/msvc presence
      # guards). gcc 15 is a strict upgrade for every other fixture too (still
      # LP64, dotcc's closest ABI twin).
      - name: Install gcc 15 (C23 #embed) and make it the default gcc
        run: |
          set -euo pipefail
          # add-apt-repository runs `apt update` itself on Ubuntu 24.04, so a
          # separate update step would just re-refresh every mirror for nothing;
          # --no-install-recommends trims extras we don't compile against.
          sudo add-apt-repository -y ppa:ubuntu-toolchain-r/test
          sudo apt-get install -y --no-install-recommends gcc-15
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-15 100
          gcc --version
          major="$(gcc -dumpfullversion | cut -d. -f1)"
          test "$major" -ge 15 || { echo "expected gcc >= 15, got $major"; exit 1; }

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      # gcc-per-fixture differential: asserts dotcc's emit matches gcc's real
      # output AND the committed snapshot. Long-double-width fixtures opt out via
      # no-gcc-oracle.txt sidecars.
      - name: gcc differential oracle (native gcc per fixture)
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo --filter "FullyQualifiedName~GccWslOracleTests"

  shared-lib-oracle:
    # Native shared-library round-trip: dotcc -shared -> NativeAOT publish to a
    # real .so -> a hand-written C consumer links it and calls the cdecl exports.
    # SharedLibOracle.RunShell uses `bash -lc` directly on Linux. NativeAOT needs
    # clang + zlib (the ILC linker deps); gcc compiles the consumer.
    runs-on: ubuntu-latest
    env:
      DOTCC_RUN_SHARED_LIB_ORACLE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # The NativeAOT linker is clang; zlib1g-dev is its runtime dep. gcc (the
      # consumer compiler) ships on the runner. Install + assert so the oracle
      # can't silently skip (IsAvailable false would pass the job without ever
      # crossing the native boundary).
      - name: Install NativeAOT + consumer toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          clang --version && gcc --version

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      # -shared a C lib, NativeAOT-publish it, then link + run a real C consumer
      # against the produced .so and assert its cdecl exports return the right
      # values — plus the import-mode twin (NativeImportOracleTests): a dotcc
      # program binds a gcc-built / dotcc-built .so's exports via -l/-L (no dlopen).
      # `~` is a substring match; the new class name doesn't contain the old.
      - name: Shared-library + native-import round-trip oracles
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo
          --filter "FullyQualifiedName~SharedLibOracleTests|FullyQualifiedName~NativeImportOracleTests"

  zig-oracle:
    # Zig front-end differential oracle. Compile + run each .zig program with the
    # real zig compiler and assert dotcc's Zig path agrees on BOTH exit code and
    # stdout. ZigOracle invokes zig DIRECTLY (no shell / no WSL hop — zig is a
    # self-contained native binary on every host), so the same oracle the maintainer
    # runs locally on win-arm64 runs here on Linux; extern-fn libc cases link -lc.
    #
    # FORKED, not `mlugg/setup-zig@v2`: we never reference a third-party action —
    # the install is inlined below (download + sha256-verify + assert version), the
    # same pin-and-assert recipe as the wabt step in wat-oracle. (Maintainer
    # preference: don't depend on actions you don't control.)
    #
    # PIN: the DURABLE tagged release 0.16.0. Tagged-release tarballs never rot;
    # dev/master builds are GC'd off ziglang.org/builds within days (our former
    # 0.17-dev.667 pin is already gone from the index), so a dev pin would break CI.
    # The GRAMMAR tracks zig 0.17-dev (syntax faithfulness); the oracle only needs a
    # zig that compiles + runs the same OBSERVABLE programs, and the test set uses the
    # stable core (fn/const/var/if/while/extern-fn/operators) that 0.16.0 and 0.17-dev
    # accept identically. Bump (version + shasum from the download index) when a test
    # needs newer syntax.
    runs-on: ubuntu-latest
    env:
      ZIG_VERSION: '0.16.0'
      ZIG_SHA256: '70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00'
      DOTCC_RUN_ZIG_ORACLE: '1'
      # Share zig's caches across all oracle invocations. Each test case builds in
      # a fresh Guid work dir, so zig's LOCAL cache (.zig-cache under the build cwd)
      # would otherwise be cold for every one of the ~138 programs; pinning both
      # cache dirs turns the repeated stdlib/compiler-rt work into cache hits.
      # (ZigOracle.RunProcess inherits the job env, so this reaches every spawn.)
      ZIG_LOCAL_CACHE_DIR: /tmp/zig-local-cache
      ZIG_GLOBAL_CACHE_DIR: /tmp/zig-global-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install zig ${{ env.ZIG_VERSION }} (pinned + checksum-verified)
        run: |
          set -euo pipefail
          # Tagged-release asset (arch-first naming, confirmed against the download
          # index). A tagged release lives under /download/<ver>/, not /builds/.
          asset="zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          url="https://ziglang.org/download/${ZIG_VERSION}/${asset}"
          curl -fsSL "$url" -o "/tmp/${asset}"
          echo "${ZIG_SHA256}  /tmp/${asset}" | sha256sum -c -
          mkdir -p /tmp/zig
          # --strip-components=1 flattens the top-level zig-*/ dir → /tmp/zig/zig.
          tar -xJf "/tmp/${asset}" -C /tmp/zig --strip-components=1
          echo "/tmp/zig" >> "$GITHUB_PATH"

      - name: Verify zig present + exact version (fail rather than let the oracle skip)
        run: |
          set -euo pipefail
          got="$(zig version)"
          echo "zig version: $got"
          test "$got" = "${ZIG_VERSION}" || { echo "expected zig ${ZIG_VERSION}, got $got"; exit 1; }

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Zig differential oracle
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo --filter "FullyQualifiedName~ZigOracleTests"

  zig-oracle-windows:
    # The Zig differential oracle on windows-latest (x86_64). ZigOracle is
    # OS-agnostic (invokes zig DIRECTLY, no WSL hop), so the only difference from the
    # Linux leg is the install (a .zip + Get-FileHash). Validates dotcc's Zig path AND
    # zig's Windows `-lc` (MSVC CRT) link for the extern-fn case. Pinned x86_64-windows
    # 0.16.0 (validated locally, 9/9). windows-11-arm is NOT added: zig 0.16.0's
    # aarch64-windows build segfaults on build-exe (the x86_64 build is fine); arm64
    # emit/grammar coverage stays in build-test-windows-arm64.
    runs-on: windows-latest
    env:
      ZIG_VERSION: '0.16.0'
      ZIG_SHA256: '68659eb5f1e4eb1437a722f1dd889c5a322c9954607f5edcf337bc3684a75a7e'
      DOTCC_RUN_ZIG_ORACLE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Windows Defender's real-time scan hooks every file create and every
      # first-execute; the oracle writes ~138 fresh .exe files plus zig-cache
      # trees, each scanned synchronously. Excluding the ephemeral CI dirs is
      # safe (nothing in them outlives the job) and is a well-known ~2x for
      # compile-heavy Windows CI. Best-effort: a cmdlet failure only costs the
      # speedup, so warn rather than fail the leg.
      - name: Exclude work/cache dirs from Defender real-time scanning
        shell: pwsh
        run: |
          $paths = @($env:GITHUB_WORKSPACE, $env:RUNNER_TEMP, $env:TEMP)
          try {
            Add-MpPreference -ExclusionPath $paths
            Write-Host "Defender exclusions added: $($paths -join '; ')"
          } catch {
            Write-Warning "Add-MpPreference failed ($_) - continuing without exclusions"
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install zig ${{ env.ZIG_VERSION }} (pinned + checksum-verified)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $asset = "zig-x86_64-windows-$env:ZIG_VERSION.zip"
          $url = "https://ziglang.org/download/$env:ZIG_VERSION/$asset"
          $zip = "$env:RUNNER_TEMP\zig.zip"
          Invoke-WebRequest -Uri $url -OutFile $zip
          $got = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          if ($got -ne $env:ZIG_SHA256) { throw "sha256 mismatch: got $got, expected $env:ZIG_SHA256" }
          Expand-Archive -Path $zip -DestinationPath "$env:RUNNER_TEMP\zig" -Force
          # the zip contains a top-level zig-x86_64-windows-<ver>\ directory
          Add-Content -Path $env:GITHUB_PATH -Value "$env:RUNNER_TEMP\zig\zig-x86_64-windows-$env:ZIG_VERSION"

      - name: Verify zig present + exact version (fail rather than let the oracle skip)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $got = (zig version).Trim()
          Write-Host "zig version: $got"
          if ($got -ne $env:ZIG_VERSION) { throw "expected zig $env:ZIG_VERSION, got $got" }

      # Same separate restore -> build --no-restore -> test --no-build structure as the
      # other Windows jobs (keeps clear of the LALR.CC.dll copy-lock flake).
      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Zig differential oracle
        # Same shared-cache rationale as the Linux leg (each case's fresh work dir
        # would otherwise cold-start zig's local cache ~138 times) — but it matters
        # far more here: NTFS small-file I/O + Defender scanning make the re-derived
        # cache the dominant cost (this leg ran 4.4x slower than ubuntu on
        # identical-CPU runners while the compute-bound Build step ran 1.0x).
        # Step-level env because the `runner` context is not available in job env.
        env:
          ZIG_LOCAL_CACHE_DIR: ${{ runner.temp }}\zig-local-cache
          ZIG_GLOBAL_CACHE_DIR: ${{ runner.temp }}\zig-global-cache
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo --filter "FullyQualifiedName~ZigOracleTests"

  aot-publish:
    # NativeAOT-publish the clang-shaped `dotcc` exe and smoke-test the produced
    # binary. PublishAot=true is set on DotCC.csproj but fires ONLY on `dotnet
    # publish` — a normal build/test never invokes ILC — so without this job the
    # exe's trim/AOT closure (System.CommandLine dispatch + the whole compile path)
    # ships untested. shared-lib-oracle drives ILC too, but only for the -shared .so,
    # a different entry point. If a new dependency or reflection use breaks the trim
    # closure, the publish fails here (PublishAot promotes trim/AOT analyzer
    # diagnostics to errors); if it merely breaks at runtime, the end-to-end smoke
    # test below catches it. The periodic `dotnet publish` regression check CLAUDE.md
    # asks for, now continuous.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # The NativeAOT linker is clang; zlib1g-dev is its runtime dep — the same ILC
      # toolchain shared-lib-oracle installs.
      - name: Install NativeAOT toolchain (clang + zlib)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev
          clang --version

      - name: Restore
        run: dotnet restore dotcc.sln

      # PublishAot fires here (never on build/test). NuGet path per CI convention.
      - name: AOT publish (Release) — the clang-shaped dotcc exe
        run: >
          dotnet publish DotCC/DotCC.csproj -c Release -o aot-publish --nologo
          -p:UseLocalLalrCc=false

      # Smoke-test the PUBLISHED NativeAOT binary end-to-end: (1) no input files ->
      # the clang-shaped error on a non-zero exit proves the CLI wiring survives
      # trimming; (2) a real C -> C# emit proves the compiler path (LALR tables,
      # preprocessor, backend) runs AOT — where a trim/reflection regression would
      # actually bite. Fail loudly rather than let a broken binary pass silently.
      - name: Smoke-test the published binary
        run: |
          set -euo pipefail
          bin="aot-publish/dotcc"
          test -x "$bin" || { echo "published dotcc binary not found at $bin"; exit 1; }
          # No input files -> clang-shaped error, non-zero exit.
          if "$bin" 2> err.txt; then echo "expected non-zero exit for no input files"; cat err.txt; exit 1; fi
          grep -q "no input files" err.txt || { echo "unexpected no-input stderr:"; cat err.txt; exit 1; }
          # Real emit path -> a .NET 10 file-based program (#:property AllowUnsafeBlocks).
          "$bin" --emit=file examples/hello/main.c examples/hello/math.c > out.cs
          grep -q "AllowUnsafeBlocks" out.cs || { echo "emit produced no file-based program:"; cat out.cs; exit 1; }
          echo "AOT publish + smoke test OK"
