name: ci

# CI for dotcc — the C → .NET 10 / C# transpiler.
#
# Mirrors the SharpAstro org convention (see sharpastro/LALR.CC's dotnet.yml):
# ubuntu-latest, setup-dotnet 10.0.x, and explicit restore → build --no-restore
# → test --no-build as SEPARATE steps. Keeping build and the test host in
# distinct, sequential processes structurally avoids the documented Windows
# flake where a test host racing a concurrent build deadlocks on the
# LALR.CC.dll copy lock — which is why the org defaults to ubuntu-latest.
#
# dotcc additionally runs a windows-latest job (build-test-windows). dotcc's
# libc runtime takes the OS-switch path in several primitives (link →
# CreateHardLinkW, getppid → toolhelp snapshot, getrusage → GetProcessTimes +
# psapi, kill → OpenProcess/TerminateProcess, …); those WINDOWS branches never
# execute on a Linux runner, so without a Windows job they'd ship untested. The
# Windows job reuses the same separate restore→build→test step structure, so it
# stays clear of the LALR.CC.dll copy-lock flake the org switched away from.
#
# dotcc ships no NuGet package, so there is no pack/publish job (unlike LALR.CC).
#
# In CI the sibling LALR.CC working copy is absent, so Directory.Build.props
# auto-selects NuGet mode; we still pass -p:UseLocalLalrCc=false to pin that
# intent (CLAUDE.md: "CI always builds the NuGet path").
#
# Jobs:
#   build-test          — the required Linux gate: Release build + unit suite +
#                 functional fixtures. The opt-in differential oracles (MSVC /
#                 gcc-WSL / gcc-quad / wat) skip cleanly here; the wat oracle,
#                 which is this branch's whole point, gets its own job below.
#   build-test-windows  — same build + unit + functional suite on windows-latest
#                 (x64), so the OS-switch Win32 branches in DotCC.Libc get real
#                 coverage.
#   build-test-windows-arm64 — the same suite on windows-11-arm: win-arm64 is the
#                 maintainer's dev arch, and exercises the blittable struct interop
#                 (pointer width / struct packing) where arm64 could differ.
#   msvc-oracle — the cl.exe differential oracle (windows-latest, x64): compile +
#                 run each fixture with MSVC and assert it matches dotcc's emit and
#                 the committed snapshot. Can't run on Linux (no cl.exe). LP64-vs-
#                 LLP64 / MSVC-C-mode-gap fixtures opt out via no-msvc-oracle.txt.
#   wat-oracle  — the --target=wat EXECUTION oracle: EmitWat → wat2wasm → node.
#                 Pins + checksum-verifies wabt and pins Node so the run is
#                 reproducible; asserts both tools are actually present (the
#                 oracle skips silently when a tool is missing, so without this
#                 guard a broken install would make the job pass without ever
#                 running the oracle); and runs single-threaded (-parallel none)
#                 so 50+ concurrent wat2wasm/node spawns can't contend. Correct
#                 and non-flaky over fast.

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

# A newer push to the same ref cancels the in-flight run for it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  build-test-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Same separate restore → build --no-restore → test --no-build structure
      # as build-test: that's what keeps Windows clear of the test-host-vs-build
      # LALR.CC.dll copy-lock deadlock the org switched to ubuntu to avoid.
      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  build-test-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # win-arm64 is the maintainer's dev arch. Same separate-steps structure as
      # the x64 job. Covers the OS-switch Win32 branches AND the blittable struct
      # interop (PROCESSENTRY32 nuint fields, fixed buffers) on arm64, where
      # struct packing / pointer width could differ from x64.
      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Unit tests
        run: dotnet test DotCC.Tests/DotCC.Tests.csproj -c Release --no-build --nologo

      - name: Functional tests (fixtures; opt-in oracles skip)
        run: dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj -c Release --no-build --nologo

  wat-oracle:
    runs-on: ubuntu-latest
    env:
      WABT_VERSION: '1.0.36'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install wabt ${{ env.WABT_VERSION }} (pinned + checksum-verified)
        run: |
          set -euo pipefail
          base="https://github.com/WebAssembly/wabt/releases/download/${WABT_VERSION}"
          asset="wabt-${WABT_VERSION}-ubuntu-20.04.tar.gz"
          curl -fsSL "$base/$asset" -o "/tmp/$asset"
          curl -fsSL "$base/$asset.sha256" -o "/tmp/$asset.sha256"
          (cd /tmp && sha256sum -c "$asset.sha256")
          tar -xzf "/tmp/$asset" -C /tmp
          echo "/tmp/wabt-${WABT_VERSION}/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain present (fail rather than let the oracle skip)
        run: |
          set -euo pipefail
          wat2wasm --version
          node --version

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      - name: Wat execution oracle (single-threaded)
        env:
          DOTCC_RUN_WAT: '1'
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo -- -parallel none

  msvc-oracle:
    runs-on: windows-latest
    env:
      DOTCC_RUN_MSVC_ORACLE: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # Mirror MsvcOracle.ProbeVswhere exactly: the fixed-path vswhere (NOT PATH),
      # the same -requires VC.Tools.x86.x64 query, and the vcvars64.bat existence
      # check. If this passes, MsvcOracle.IsAvailable is true and the oracle runs
      # for real — so the oracle can't pass by silently skipping every fixture
      # (the failure mode the wat-oracle guard also guards against).
      - name: Verify MSVC present (fail rather than let the oracle silently skip)
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere not found at $vswhere" }
          $vc = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($vc)) { throw "vswhere found no VC.Tools.x86.x64 install" }
          $vcvars = Join-Path $vc 'VC\Auxiliary\Build\vcvars64.bat'
          if (-not (Test-Path $vcvars)) { throw "vcvars64.bat missing at $vcvars" }
          Write-Host "VC toolset at $vc"

      - name: Restore
        run: dotnet restore dotcc.sln

      - name: Build (Release, NuGet path)
        run: dotnet build dotcc.sln -c Release --no-restore --nologo -p:UseLocalLalrCc=false

      # cl.exe-per-fixture differential: asserts dotcc's emit matches MSVC's real
      # output AND the committed snapshot. LP64-vs-LLP64 / MSVC-C-mode-gap
      # fixtures opt out via no-msvc-oracle.txt sidecars.
      - name: MSVC differential oracle (cl.exe per fixture)
        run: >
          dotnet test DotCC.FunctionalTests/DotCC.FunctionalTests.csproj
          -c Release --no-build --nologo --filter "FullyQualifiedName~MsvcOracleTests"
